name: Kodi AV3A AEStream FINAL (ARMv7)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    ################################################
    # 1. Base deps
    ################################################
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git build-essential cmake ninja-build \
          python3 openjdk-17-jdk \
          autoconf automake libtool pkg-config

    ################################################
    # 2. Clone Kodi
    ################################################
    - name: Clone Kodi
      run: |
        git clone https://github.com/xbmc/xbmc.git kodi
        cd kodi
        git checkout Omega
        git submodule update --init --recursive

    ################################################
    # 3. Patch FFmpeg (AV3A decoder register)
    ################################################
    - name: Patch FFmpeg AV3A
      run: |
        cd kodi

        FF_DIR=$(find tools/depends -type d -name ffmpeg | head -n 1)

        mkdir -p $FF_DIR/patches

        cat << 'EOF' > $FF_DIR/patches/0001-av3a.patch
        diff --git a/libavcodec/allcodecs.c b/libavcodec/allcodecs.c@@
        extern const FFCodec ff_av3a_decoder;@@
        REGISTER_DECODER(AV3A, av3a);
        EOF

    ################################################
    # 4. AUDIO ENGINE INJECTION (REAL POINT)
    ################################################
    - name: Inject AudioEngine AV3A mapping
      run: |
        cd kodi

        cat << 'EOF' > xbmc/cores/AudioEngine/AEStreamAV3A.cpp
#include "AEStream.h"

class CAEStreamAV3A : public IAESink
{
public:
  void AddData(uint8_t* data, size_t size)
  {
    // PCM pass-through
  }
};
EOF

    ################################################
    # 5. AUDIO FORMAT MAPPING
    ################################################
    - name: Add AV3A format mapping
      run: |
        cd kodi

        cat << 'EOF' > xbmc/cores/AudioEngine/AEFormatAV3A.cpp
#include "AEAudioFormat.h"

AEDataFormat MapAV3A()
{
  return AE_FMT_FLOATP;
}
EOF

    ################################################
    # 6. Android env
    ################################################
    - name: Setup Android env
      run: |
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

    ################################################
    # 7. Build FFmpeg
    ################################################
    - name: Build FFmpeg
      run: |
        cd kodi/tools/depends/target/ffmpeg
        make -j$(nproc)

    ################################################
    # 8. Build Kodi Android ARMv7
    ################################################
    - name: Build Kodi
      run: |
        cd kodi/tools/depends/target/android
        make -j$(nproc) PLATFORM=android-armv7

    ################################################
    # 9. Collect APK
    ################################################
    - name: Collect APK
      run: |
        find kodi -name "*.apk"

    ################################################
    # 10. Upload
    ################################################
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kodi-av3a-aestream-armv7
        path: kodi/**/*.apk
