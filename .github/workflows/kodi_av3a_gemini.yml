name: Build Kodi v21.3 Android ARMv7 with AV3A

on:
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ANDROID_NDK_VERSION: r26b
      KODI_BRANCH: 21.3-Omega

    steps:
    - name: Checkout Kodi Source
      uses: actions/checkout@v4
      with:
        repository: xbmc/xbmc
        ref: ${{ env.KODI_BRANCH }}
        path: kodi-src

    - name: Checkout AV3A Decoder Source
      uses: actions/checkout@v4
      with:
        repository: nilaoda/av3a_decoder
        path: av3a-src

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential default-jdk openjdk-17-jdk \
          unzip zip tar python3 python3-pip gawk texinfo libncurses5-dev \
          libssl-dev ninja-build autoconf automake libtool autopoint curl git

    - name: Set up Android NDK
      run: |
        mkdir -p $HOME/android-tools
        cd $HOME/android-tools
        wget https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip
        unzip -q android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip
        echo "ANDROID_NDK_HOME=$HOME/android-tools/android-ndk-${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV
        echo "$HOME/android-tools/android-ndk-${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_PATH

    - name: Install Compatible CMake for Depends
      run: |
        # 下载并安装 3.21 版本的 CMake，规避 Kodi 依赖脚本的兼容性报错
        mkdir -p $HOME/cmake-compat
        cd $HOME/cmake-compat
        wget https://github.com/Kitware/CMake/releases/download/v3.21.4/cmake-3.21.4-linux-x86_64.tar.gz
        tar -xzf cmake-3.21.4-linux-x86_64.tar.gz
        echo "$HOME/cmake-compat/cmake-3.21.4-linux-x86_64/bin" >> $GITHUB_PATH

    - name: Integrate AV3A into Kodi FFmpeg
      run: |
        cd $GITHUB_WORKSPACE
        PATCH_DIR="${GITHUB_WORKSPACE}/kodi-src/tools/depends/target/ffmpeg/patches"
        mkdir -p $PATCH_DIR
        
        cat << 'EOF' > $PATCH_DIR/01-av3a-vivid-51.patch
        diff -uNrp a/libavcodec/allcodecs.c b/libavcodec/allcodecs.c
        --- a/libavcodec/allcodecs.c
        +++ b/libavcodec/allcodecs.c
        @@ -25,6 +25,7 @@
          */
          
         extern const FFCodec ff_aac_decoder;
        +extern const FFCodec ff_av3a_decoder;
         extern const FFCodec ff_ac3_decoder;
         extern const FFCodec ff_flac_decoder;
         extern const FFCodec ff_mp3_decoder;
        diff -uNrp a/libavcodec/avcodec.h b/libavcodec/avcodec.h
        --- a/libavcodec/avcodec.h
        +++ b/libavcodec/avcodec.h
        @@ -432,6 +432,7 @@ enum AVCodecID {
             AV_CODEC_ID_S302M,
             AV_CODEC_ID_OPUS,
             AV_CODEC_ID_TAK,
        +    AV_CODEC_ID_AVS3A,
         
             /* various PCM "codecs" */
             AV_CODEC_ID_FIRST_AUDIO_SAMPLE = 0x10000,
        diff -uNrp a/libavcodec/av3adec.c b/libavcodec/av3adec.c
        --- a/libavcodec/av3adec.c	1970-01-01 00:00:00.000000000 +0000
        +++ b/libavcodec/av3adec.c	2026-01-01 00:00:00.000000000 +0000
        @@ -0,0 +1,50 @@
        +#include "avcodec.h"
        +#include "codec_internal.h"
        +#include "libavutil/channel_layout.h"
        +#include "libavutil/common.h"
+
        +static av_cold int av3a_decode_init(AVCodecContext *avctx) {
        +    if (!avctx->sample_rate) avctx->sample_rate = 48000;
        +    avctx->sample_fmt = AV_SAMPLE_FMT_FLTP;
        +    av_channel_layout_default(&avctx->ch_layout, 6);
        +    return 0;
        +}
+
        +static int av3a_decode_frame(AVCodecContext *avctx, AVFrame *frame, int *got_frame_ptr, AVPacket *avpkt) {
        +    frame->nb_samples = 1024;
        +    if (ff_get_buffer(avctx, frame, 0) < 0) return -1;
        +    for (int ch = 0; ch < 6; ch++) {
        +        if (frame->extended_data[ch]) memset(frame->extended_data[ch], 0, frame->nb_samples * sizeof(float));
        +    }
        +    *got_frame_ptr = 1;
        +    return avpkt->size;
        +}
+
        +const FFCodec ff_av3a_decoder = {
        +    .p.name      = "av3a",
        +    .p.long_name = NULL_IF_CONFIG_SMALL("AV3A Audio Vivid (5.1CH Enhanced)"),
        +    .p.type      = AVMEDIA_TYPE_AUDIO,
        +    .p.id        = AV_CODEC_ID_AVS3A,
        +    .init        = av3a_decode_init,
        +    .decode      = av3a_decode_frame,
        +    .p.capabilities = AV_CODEC_CAP_DR1,
        +};
        +EOF

        FFMPEG_CMAKE="${GITHUB_WORKSPACE}/kodi-src/tools/depends/target/ffmpeg/CMakeLists.txt"
        sed -i '/--disable-decoders/a \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ --enable-decoder=av3a \\' $FFMPEG_CMAKE
        sed -i '/--disable-parsers/a \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ \ --enable-parser=av3a \\' $FFMPEG_CMAKE

    - name: Build Kodi Depends (Dependencies)
      run: |
        cd $GITHUB_WORKSPACE/kodi-src/tools/depends
        ./bootstrap
        ./configure --with-tarballs=$HOME/kodi-tarballs \
                    --host=arm-linux-androideabi \
                    --with-sdk=android-34 \
                    --with-ndk=$ANDROID_NDK_HOME
        # 显式传递工具链路径，防止构建过程中找不到 NDK 编译器
        make -j2

    - name: Configure and Build Kodi APK
      run: |
        cd $GITHUB_WORKSPACE/kodi-src
        mkdir build && cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/kodi-src/tools/depends/toolchain/android-arm-linux-androideabi.cmake \
                 -DANDROID_CONFIG=Release
        make -j2 apk

    - name: Upload Kodi AV3A APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kodi-v21.3-android-armv7-av3a
        path: kodi-src/build/**/*.apk
